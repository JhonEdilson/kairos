<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Kairos K — Stencil">
  <!--
    K-A2: Stencil (Anthropic-style con gaps)
    Misma geometría que A1, pero con 4px de espacio
    entre el stem y los brazos. Look industrial/técnico.
    Los gaps son intencionales — precisión quirúrgica.
  -->

  <!-- Stem -->
  <rect x="10" y="8" width="18" height="84" fill="currentColor"/>

  <!-- Upper arm — empieza a x=32 (4px gap desde stem x=28) -->
  <polygon points="32,31 80,8 80,25 32,48" fill="currentColor"/>

  <!-- Lower arm — empieza a x=32 (4px gap) -->
  <polygon points="32,52 80,75 80,92 32,69" fill="currentColor"/>
</svg>
