<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Kairos K — Italic / Forward lean">
  <!--
    K-B2: Italic K (Forward lean ~8°)
    La K completa inclinada hacia adelante.
    Coordenadas computadas manualmente con tan(8°)=0.141
    aplicado desde el punto central y=50 del letterform.
    Sugiere movimiento, momentum, velocidad.
    La K "en acción" — kairos como instante activo.

    Formula: x_new = x + (50-y) * 0.141
  -->

  <!-- Stem — coordenadas inclinadas -->
  <polygon points="15.9,8 33.9,8 22.1,92 4.1,92" fill="currentColor"/>

  <!-- Upper arm — inclinado -->
  <polygon points="30.4,33 85.9,8 83.5,25 28,50" fill="currentColor"/>

  <!-- Lower arm — inclinado -->
  <polygon points="28,50 76.5,75 74.1,92 25.6,67" fill="currentColor"/>
</svg>
