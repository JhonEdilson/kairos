<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Kairos K — Geométrica pura">
  <!--
    K-A1: Geométrica pura (Anthropic-style)
    Letterform reducido a geometría esencial.
    Stroke uniforme, flat ends, monolítica.
    Inspirado en el "AI" de Anthropic.
  -->

  <!-- Stem (barra vertical) -->
  <rect x="10" y="8" width="18" height="84" fill="currentColor"/>

  <!-- Upper arm (brazo superior) — parallelogram uniforme -->
  <polygon points="28,33 80,8 80,25 28,50" fill="currentColor"/>

  <!-- Lower arm (brazo inferior) — parallelogram uniforme -->
  <polygon points="28,50 80,75 80,92 28,67" fill="currentColor"/>
</svg>
