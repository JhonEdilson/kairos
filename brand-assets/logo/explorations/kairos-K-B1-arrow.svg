<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Kairos K — Arrow / Momentum">
  <!--
    K-B1: Arrow K (Momentum)
    Upper arm = igual a A1.
    Lower arm termina en punta de flecha —
    el K lleva momentum incorporado, sugiere "→".
    Automatización como vector con dirección.
  -->

  <!-- Stem -->
  <rect x="10" y="8" width="18" height="84" fill="currentColor"/>

  <!-- Upper arm — mismo que A1 -->
  <polygon points="28,33 80,8 80,25 28,50" fill="currentColor"/>

  <!-- Lower arm con arrow tip (punta a la derecha) -->
  <!-- Va de (28,50)-(28,67) en stem → cuerpo → punta en (93,83) -->
  <polygon points="28,50 28,67 80,92 93,83 80,74" fill="currentColor"/>
</svg>
