<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kairos Logo — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f5f5f5; }

  header {
    padding: 28px 48px 20px;
    border-bottom: 1px solid #1c1c1c;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; }
  header .dot { width: 6px; height: 6px; border-radius: 50%; background: #D97706; }

  h2 { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }

  /* ── Variantes de color ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid #1c1c1c;
  }
  .cell {
    padding: 56px 32px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border-right: 1px solid #1c1c1c;
  }
  .cell:last-child { border-right: none; }

  .bg-dark   { background: #0a0a0a; }
  .bg-dark h2 { color: #333; }

  .bg-mid    { background: #141414; }
  .bg-mid h2 { color: #333; }

  .bg-white  { background: #ffffff; }
  .bg-white h2 { color: #ccc; }

  .bg-cream  { background: #FAF3E7; }
  .bg-cream h2 { color: #bbb; }

  .bg-accent { background: #D97706; }
  .bg-accent h2 { color: rgba(0,0,0,0.35); }

  .bg-navy   { background: #0B0F1A; }
  .bg-navy h2 { color: #2a3040; }

  /* ── Escala de tamaños ── */
  .sizes-row {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    padding: 48px;
    background: #0d0d0d;
    border-bottom: 1px solid #1c1c1c;
  }
  .size-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .size-label { font-size: 10px; color: #444; letter-spacing: 0.1em; }

  /* ── Wordmark combinado ── */
  .wordmark-section {
    padding: 40px 48px;
    background: #0d0d0d;
    border-bottom: 1px solid #1c1c1c;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .wordmark-row { display: flex; align-items: center; gap: 14px; }
  .wordmark-text {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #f5f5f5;
    line-height: 1;
  }
  .wordmark-text.sm { font-size: 20px; }
  .wordmark-text.xs { font-size: 14px; }
  .wordmark-accent { color: #D97706; }

  section-title {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    padding: 20px 48px 0;
    background: #0d0d0d;
  }
</style>
